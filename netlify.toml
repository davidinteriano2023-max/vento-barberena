[build]
  command   = 'sed -i "s|FIREBASE_KEY_PLACEHOLDER|${FIREBASE_API_KEY}|g" cotizador.html'
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Reporte diario: 8:00am Guatemala (UTC-6 = 14:00 UTC)
[functions."reporte-diario"]
  schedule = "0 14 * * *"

# Reporte semanal: lunes 8:00am Guatemala
[functions."reporte-semanal"]
  schedule = "0 14 * * 1"

# La API key de Firebase Web es un identificador publico de cliente (la seguridad
# real esta en las reglas de Firestore). Omitirla del escaneo de secretos.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyD8MUzezXAT9EFy2RMKGyRSCaMfJIBmwIU"
