[build]
  command   = "sed -i \"s|FIREBASE_KEY_PLACEHOLDER|${FIREBASE_API_KEY}|g\" cotizador.html"
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Reporte diario: todos los días a las 8:00am hora Guatemala (UTC-6 = 14:00 UTC).
[functions."reporte-diario"]
  schedule = "0 14 * * *"

